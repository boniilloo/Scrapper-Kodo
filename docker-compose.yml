services:
  kodo-scraper:
    build: .
    image: kodo-scraper:latest
    container_name: kodo-scraper
    # Coolify/Traefik routes the configured domain to this container over the
    # internal Docker network, so we just expose the port instead of binding
    # it to the host (which would conflict with other services on :8000).
    expose:
      - "8000"
    environment:
      MAX_CONCURRENCY: "2"
      SCRAPE_TIMEOUT_MS: "60000"
      LOG_LEVEL: "INFO"
    restart: unless-stopped
    # Chromium needs more /dev/shm than the default 64MB or it crashes.
    shm_size: "1gb"
