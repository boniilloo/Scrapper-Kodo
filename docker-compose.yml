services:
  kodo-scraper:
    build: .
    image: kodo-scraper:latest
    container_name: kodo-scraper
    # Coolify v4 detects the routing port from `ports:` (not `expose:`), so we
    # keep it. Host port 8001 is used because :8000 was already taken on the
    # Coolify server by another service.
    ports:
      - "8001:8000"
    environment:
      MAX_CONCURRENCY: "2"
      SCRAPE_TIMEOUT_MS: "60000"
      LOG_LEVEL: "INFO"
    restart: unless-stopped
    # Chromium needs more /dev/shm than the default 64MB or it crashes.
    shm_size: "1gb"
